<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QUBE Simulator</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Entire original styling preserved */
    .container {
      max-width: 1200px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    .input-row div {
      flex: 1;
    }

    label {
      font-weight: bold;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
      color: #1a1a2e;
    }

    input[type="text"] {
      padding: 8px;
      width: 100%;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .buttons {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      background-color: #00f0ff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #1a1a2e;
      font-weight: bold;
      transition: background-color 0.3s ease;
      margin-right: 15px;
    }

    button:hover {
      background-color: #00c4cc;
    }

    #output {
      white-space: pre-wrap;
      background: #f0f8ff;
      border-radius: 6px;
      padding: 15px;
      min-height: 100px;
      font-family: monospace;
      color: #1a1a2e;
      border: 1px solid #ccc;
    }

    .qubit-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 20px;
      background: #fafafa;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .qubit-item {
      padding: 10px;
      background-color: #e6f7ff;
      border-radius: 6px;
      border: 1px solid #cce7ff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .qubit-item:hover {
      background-color: #f0f0f0;
    }

    .glow {
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
      border: 2px solid green;
    }

    #execution-log, #result-output {
      flex: 1;
      height: 200px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
      background-color: #f0f0f0;
      font-family: monospace;
      white-space: pre-line;
      border-radius: 8px;
    }

    #result-output {
      background-color: #fff;
      font-weight: bold;
    }

    #log-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    #clear-log-btn {
      margin-top: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>
  <script>
    fetch("header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header-placeholder").innerHTML = data;
      })
      .catch(err => console.error("Error loading header:", err));
  </script>

  <div class="container">
    <h2>Quantum Simulator</h2>

    <div class="input-group">
      <div>
        <label for="qubit-name">Qubit Name (ID)</label>
        <input type="text" id="qubit-name" placeholder="e.g. qu1" />
      </div>
    </div>

    <div class="input-group">
      <div class="input-row">
        <div>
          <label for="input-a">Parameter A (Real)</label>
          <input type="text" id="input-a" placeholder="e.g. 1.0" />
        </div>
      </div>

      <div class="input-row">
        <div>
          <label for="input-c">Parameter B (Real)</label>
          <input type="text" id="input-c" placeholder="e.g. 0.2" />
        </div>
      </div>
    </div>

    <div class="buttons">
      <button id="create-qubit-btn">Create Qubit</button>
      <button id="execute-btn">Execute</button>
    </div>

    <div id="log-container">
      <div>
        <h4>Execution Log</h4>
        <div id="execution-log"></div>
      </div>
      <div>
        <h4>Qubit Result</h4>
        <div id="result-output"></div>
      </div>
    </div>

    <button id="clear-log-btn">Clear Logs</button>

    <h3>Created Qubits:</h3>
    <div class="qubit-list" id="qubit-list"></div>
  </div>

<script>
const executionLogEl = document.getElementById('execution-log');
const resultOutputEl = document.getElementById('result-output');
const qubitListEl = document.getElementById('qubit-list');
let selectedQubitId = null;
let selectedQubitElement = null;

function appendLog(message) {
  const timestamp = new Date().toLocaleString();
  executionLogEl.textContent += `[${timestamp}] ${message}\n`;
  executionLogEl.scrollTop = executionLogEl.scrollHeight;
}

function setResultOutput(message) {
  resultOutputEl.textContent = message;
}

document.getElementById('create-qubit-btn').addEventListener('click', () => {
  const a = document.getElementById('input-a').value.trim();
  const c = document.getElementById('input-c').value.trim();
  const id = document.getElementById('qubit-name').value.trim();

  if (!a || !c || !id) {
    alert("Please fill all fields.");
    return;
  }

  if (isQubitNameExists(id)) {
    alert("A qubit with this name already exists.");
    return;
  }

  const payload = {
    id: id,
    aReal: parseFloat(a),
    bReal: parseFloat(c)
  };

  appendLog(`Creating qubit '${id}'...`);

  fetch("https://qube-simulator.onrender.com/create-qubit", {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => res.text())
  .then(data => {
    if (data.includes("successfully")) {
      addQubitToUI(id, a, "auto-generated", c, "auto-generated");
      appendLog(`Qubit '${id}' created.`);
    } else {
      appendLog(`Error: ${data}`);
    }
  })
  .catch(err => appendLog(`Error: ${err.message}`));
});

function isQubitNameExists(id) {
  return document.querySelector(`[data-id='${id}']`) !== null;
}

function addQubitToUI(id, aReal, aImag, bReal, bImag) {
  const div = document.createElement("div");
  div.className = "qubit-item";
  div.setAttribute("data-id", id);
  div.innerHTML = `
    <p><strong>Name:</strong> ${id}</p>
    <p><strong>Alpha:</strong> ${aReal} + ${aImag}i</p>
    <p><strong>Beta:</strong> ${bReal} + ${bImag}i</p>
    <button class="delete-btn">Delete</button>
  `;

  div.querySelector(".delete-btn").addEventListener("click", () => {
    deleteQubit(id, div);
  });

  div.addEventListener("click", () => {
    if (selectedQubitElement) selectedQubitElement.classList.remove('glow');
    selectedQubitId = id;
    selectedQubitElement = div;
    div.classList.add('glow');

    document.getElementById('qubit-name').value = id;
    document.getElementById('input-a').value = aReal;
    document.getElementById('input-c').value = bReal;
  });

  qubitListEl.appendChild(div);
}

function deleteQubit(id, div) {
  appendLog(`Deleting qubit '${id}'...`);
  qubitListEl.removeChild(div);

  fetch("https://qube-simulator.onrender.com/delete-qubit", {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  })
  .then(res => res.text())
  .then(data => appendLog(data))
  .catch(err => appendLog(`Error deleting qubit: ${err.message}`));
}

document.getElementById('execute-btn').addEventListener('click', () => {
  if (!selectedQubitId) {
    alert("Please select a qubit.");
    return;
  }

  appendLog(`Executing qubit '${selectedQubitId}'...`);

  fetch("https://qube-simulator.onrender.com/execute", {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: selectedQubitId })
  })
  .then(res => res.text())
  .then(data => setResultOutput(data))
  .catch(err => appendLog(`Error executing qubit: ${err.message}`));
});

document.getElementById('clear-log-btn').addEventListener('click', () => {
  executionLogEl.textContent = '';
  resultOutputEl.textContent = '';
});
</script>

</body>
</html>
