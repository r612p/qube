<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ... (keep all meta tags and title the same) ... -->
  <style>
    /* ... (keep all existing styles the same) ... */
    
    /* Add this new style for parameter display */
    .parameter-display {
      padding: 8px;
      background-color: #f5f5f5;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-family: monospace;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <!-- Header placeholder (keep this the same) -->
  <div id="header-placeholder"></div>

  <div class="container">
    <h2>Quantum Simulator</h2>

    <div class="input-group">
      <div>
        <label for="qubit-name">Qubit Name (ID)</label>
        <input type="text" id="qubit-name" placeholder="e.g. qu1" />
      </div>
    </div>

    <div class="input-group">
      <div class="input-row">
        <div>
          <label>Parameter A (Real)</label>
          <div class="parameter-display">0.0 (default)</div>
        </div>
        <div>
          <label>Parameter A (Imag)</label>
          <div class="parameter-display">0.0 (default)</div>
        </div>
      </div>

      <div class="input-row">
        <div>
          <label>Parameter B (Real)</label>
          <div class="parameter-display">0.0 (default)</div>
        </div>
        <div>
          <label>Parameter B (Imag)</label>
          <div class="parameter-display">1.0 (default)</div>
        </div>
      </div>
    </div>

    <!-- ... (keep buttons, log container, and qubit list the same) ... -->
  </div>

  <script>
    // ... (keep header fetch script the same) ...

    const executionLogEl = document.getElementById('execution-log');
    const resultOutputEl = document.getElementById('result-output');
    const qubitListEl = document.getElementById('qubit-list');
    let selectedQubitId = null;
    let selectedQubitElement = null;

    // ... (keep appendLog and setResultOutput functions the same) ...

    document.getElementById('create-qubit-btn').addEventListener('click', () => {
      const id = document.getElementById('qubit-name').value.trim();

      if (!id) {
        alert("Please enter a Qubit Name.");
        return;
      }

      if (isQubitNameExists(id)) {
        alert("A qubit with this name already exists. Please choose a different name.");
        return;
      }

      // Use fixed default values (0,0,0,1)
      const payload = {
        id: id,
        aReal: 0,
        aImag: 0,
        bReal: 0,
        bImag: 1
      };

      appendLog(`Attempting to create qubit with ID: ${id}`);

      fetch("https://qube-simulator.onrender.com/create-qubit", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.text())
      .then(data => {
        if (data.includes("created successfully")) {
          addQubitToUI(id);
          appendLog(`Qubit '${id}' created successfully.`);
        } else {
          appendLog(`Error: ${data}`);
        }
      })
      .catch(err => {
        appendLog(`Error: ${err.message}`);
      });
    });

    function isQubitNameExists(id) {
      return document.querySelector(`[data-id='${id}']`) !== null;
    }

    function addQubitToUI(id) {
      const qubitDiv = document.createElement("div");
      qubitDiv.className = "qubit-item";
      qubitDiv.setAttribute("data-id", id);
      qubitDiv.innerHTML = `
        <p><strong>Qubit Name:</strong> ${id}</p>
        <p><strong>Alpha:</strong> 0 + 0i</p>
        <p><strong>Beta:</strong> 0 + 1i</p>
        <button class="delete-btn">Delete</button>
      `;

      qubitDiv.querySelector(".delete-btn").addEventListener("click", () => {
        deleteQubit(id, qubitDiv);
      });

      qubitDiv.addEventListener("click", () => {
        if (selectedQubitElement) selectedQubitElement.classList.remove('glow');
        selectedQubitId = id;
        selectedQubitElement = qubitDiv;
        qubitDiv.classList.add('glow');
        document.getElementById('qubit-name').value = id;
      });

      qubitListEl.appendChild(qubitDiv);
    }

    // ... (keep deleteQubit, execute button, and clear logs functions the same) ...
  </script>
</body>
</html>
