<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QUBE Simulator</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .container {
      max-width: 650px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    .input-row div {
      flex: 1;
    }

    label {
      font-weight: bold;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
      color: #1a1a2e;
    }

    input[type="text"] {
      padding: 8px;
      width: 100%;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .buttons {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      background-color: #00f0ff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #1a1a2e;
      font-weight: bold;
      transition: background-color 0.3s ease;
      margin-right: 15px;
    }

    button:hover {
      background-color: #00c4cc;
    }

    #output {
      white-space: pre-wrap;
      background: #f0f8ff;
      border-radius: 6px;
      padding: 15px;
      min-height: 100px;
      font-family: monospace;
      color: #1a1a2e;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <!-- Header placeholder -->
  <div id="header-placeholder"></div>

  <script>
    fetch("header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header-placeholder").innerHTML = data;
      })
      .catch(err => console.error("Error loading header:", err));
  </script>

  <div class="container">
    <h2>Quantum Simulator</h2>

    <div class="input-group">
  <div>
    <label for="qubit-name">Qubit Name (ID)</label>
    <input type="text" id="qubit-name" placeholder="e.g. qu1" />
  </div>
</div>


    <div class="input-group">
    

      <div class="input-row">
        <div>
          <label for="input-a">Parameter A (Real)</label>
          <input type="text" id="input-a" placeholder="e.g. 1.0" />
        </div>
        <div>
          <label for="input-b">Parameter A (Imag)</label>
          <input type="text" id="input-b" placeholder="e.g. 0.5" />
        </div>
      </div>

      <div class="input-row">
        <div>
          <label for="input-c">Parameter B (Real)</label>
          <input type="text" id="input-c" placeholder="e.g. 0.2" />
        </div>
        <div>
          <label for="input-d">Parameter B (Imag)</label>
          <input type="text" id="input-d" placeholder="e.g. 0.8" />
        </div>
      </div>
    </div>

    <div class="buttons">
      <button id="create-qubit-btn">Create Qubit</button>
      <button id="execute-btn">Execute</button>
    </div>

    <div id="output"></div>
  </div>

  <script>
  const outputEl = document.getElementById('output');

  // CREATE QUBIT
  document.getElementById('create-qubit-btn').addEventListener('click', () => {
    const a = document.getElementById('input-a').value.trim();
    const b = document.getElementById('input-b').value.trim();
    const c = document.getElementById('input-c').value.trim();
    const d = document.getElementById('input-d').value.trim();
    const id = document.getElementById('qubit-name').value.trim();

    if (!a || !b || !c || !d || !id) {
      alert("Please fill all fields including Qubit Name.");
      return;
    }

    const payload = {
      id: id,
      aReal: parseFloat(a),
      aImag: parseFloat(b),
      bReal: parseFloat(c),
      bImag: parseFloat(d)
    };

    fetch("https://qube-simulator.onrender.com/create-qubit", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(res => res.text())
    .then(data => {
      outputEl.textContent = data;
    })
    .catch(err => {
      outputEl.textContent = "Error: " + err.message;
    });
  });

  // EXECUTE QUBIT
  document.getElementById('execute-btn').addEventListener('click', () => {
    const id = document.getElementById('qubit-name').value.trim();

    if (!id) {
      alert("Please enter the Qubit Name to execute.");
      return;
    }

    fetch("https://qube-simulator.onrender.com/execute", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id })
    })
    .then(res => res.text())
    .then(data => {
      outputEl.textContent = data;
    })
    .catch(err => {
      outputEl.textContent = "Error: " + err.message;
    });
  });
</script>


</body>
</html>
